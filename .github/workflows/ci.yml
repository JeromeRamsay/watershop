name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # API — Lint & Test
  # ─────────────────────────────────────────────────────────────────────────────
  test-api:
    name: API – Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watershop_api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: watershop_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests --forceExit --coverage
        env:
          # Minimal env for tests (no real DB/Redis needed — all mocked)
          MONGO_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-secret-for-ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: watershop_api/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # UI — Lint & Build
  # ─────────────────────────────────────────────────────────────────────────────
  build-ui:
    name: UI – Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watershop_web_ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: watershop_web_ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Dummy value so Next.js can build without a real API
          NEXT_PUBLIC_API_URL: https://api.example.com

