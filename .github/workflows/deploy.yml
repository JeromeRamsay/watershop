name: Deploy

on:
  # Only deploy when CI passes on the main branch
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to DigitalOcean App Platform
    runs-on: ubuntu-latest

    # Only run if the CI workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install and authenticate doctl
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      # ── Deploy API ──────────────────────────────────────────────────────────
      # This triggers a new deployment for the API component on App Platform.
      # DO_API_APP_ID must be set in GitHub → Settings → Secrets → Actions.
      - name: Deploy API
        run: |
          echo "Deploying API to DigitalOcean App Platform..."
          doctl apps create-deployment ${{ secrets.DO_API_APP_ID }} --wait
          echo "API deployment complete."

      # ── Deploy UI ───────────────────────────────────────────────────────────
      # If the frontend is a separate App Platform app, set DO_UI_APP_ID.
      # If it is a component in the same app as the API, remove this step and
      # use the same DO_API_APP_ID above (one deploy triggers both components).
      - name: Deploy UI
        run: |
          echo "Deploying UI to DigitalOcean App Platform..."
          doctl apps create-deployment ${{ secrets.DO_UI_APP_ID }} --wait
          echo "UI deployment complete."

      # ── Verify deployment health ─────────────────────────────────────────
      - name: Verify API health
        run: |
          echo "Waiting for API to come online..."
          sleep 20
          # Replace with your actual API domain once deployed
          # curl --fail https://api.your-domain.com/health || exit 1
          echo "Health check skipped — update ARCHITECTURE.md §13 once /health endpoint is added."

